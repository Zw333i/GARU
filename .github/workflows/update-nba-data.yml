name: Update NBA Data

on:
  schedule:
    - cron: '0 16 * * 6'
  workflow_dispatch: 
jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run full Supabase sync script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          NBA_API_TIMEOUT: "120"
          NBA_API_MAX_RETRIES: "5"
          NBA_API_RETRY_BASE_DELAY: "2"
          FAIL_ON_FETCH_ERROR: "false"
        run: |
          cd backend
          python scripts/sync_to_supabase.py

      - name: Upload data artifact (if local JSON generated)
        uses: actions/upload-artifact@v4
        with:
          name: nba-data
          path: backend/players_backup.json
          if-no-files-found: ignore
